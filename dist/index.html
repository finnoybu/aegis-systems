<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>AEGIS</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body {
      margin:0;
      background:#0b0b0f;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
    }
    .splash {
      position:relative;
      width:100%;
      height:100%;
      background:url("assets/hero.png") center/cover no-repeat;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }
    .overlay {
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at center, rgba(0,0,0,.4), rgba(0,0,0,.9));
    }
    .content {
      position:relative;
      z-index:2;
      color:white;
      max-width:800px;
      padding:20px;
    }
    h1 {
      font-family: serif;
      letter-spacing:.25em;
      font-size:3rem;
      margin-bottom:20px;
      color:#d4af37;
    }
    .maxim {
      font-size:1.2rem;
      margin-bottom:40px;
      opacity:0;
      animation: fadeIn 2.5s ease forwards;
      animation-delay:1s;
    }
    .enter-btn {
      padding:12px 28px;
      border:1px solid #d4af37;
      background:transparent;
      color:#d4af37;
      letter-spacing:.15em;
      cursor:pointer;
      transition:.3s;
    }
    .enter-btn:hover {
      background:#d4af37;
      color:black;
    }
    @keyframes fadeIn {
      to { opacity:1; }
    }
  </style>
</head>
<body>
<div class="splash">
  <div class="overlay"></div>
  <div class="content">
    <h1>AEGIS</h1>
    <div class="maxim">
      Capability without constraint is not intelligence&trade;
    </div>
    <a href="constitution.html">
      <button class="enter-btn">ENTER THE CONSTITUTION</button>
    </a>
  </div>
</div>
</body>
</html>
